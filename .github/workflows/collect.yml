name: Collect invoices

on:
  schedule:
    # Every day at 06:00 UTC (00:00 Costa Rica). Adjust as needed.
    - cron: '0 6 * * *'
  workflow_dispatch: # manual / dashboard-triggered runs
    inputs:
      lookback_days:
        description: 'For the FIRST scan / a full re-scan: how many days back to search'
        required: false
        default: '730'
      full_rescan:
        description: 'Re-scan the whole window even for mailboxes already synced (use after an extractor change). 1 = yes'
        required: false
        default: '0'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      CONCURRENCY: '5'
      # Collection is incremental: after a mailbox's first sync, runs fetch only
      # NEW mail (by IMAP UID), so LOOKBACK_DAYS only bounds the first scan or a
      # forced full re-scan. Nightly cron falls back to a 30-day window for any
      # not-yet-synced mailbox; already-synced ones just pull new mail.
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
      # 1 = re-scan the whole window even for already-synced mailboxes (after an
      # extractor change, so old invoices re-extract with the new fields).
      FULL_RESCAN: ${{ github.event.inputs.full_rescan || '0' }}
      # Optional: paste a full mailboxes JSON array as a secret to use the
      # file-based list instead of the mailboxes stored in the app.
      MAILBOXES_JSON: ${{ secrets.MAILBOXES_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Provide mailboxes.json from secret (optional)
        if: env.MAILBOXES_JSON != ''
        run: printf '%s' "$MAILBOXES_JSON" > collector/mailboxes.json
      - name: Run collector
        if: env.APP_URL != ''
        run: npm run collect
      - name: Skip notice
        if: env.APP_URL == ''
        run: echo "APP_URL secret not set — skipping. Add APP_URL and INGEST_TOKEN repo secrets to enable scheduled collection."
